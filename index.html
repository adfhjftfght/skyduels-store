<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(160deg, #0a0a0f 0%, #12121a 50%, #0f0f14 100%);
            color: #e8e8ec;
            padding: 2rem 1.5rem;
        }
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { margin-top: 0.5rem; color: #71717a; font-size: 0.95rem; }
        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .signed-in {
            margin-top: 1.25rem;
            padding: 0.85rem 1.25rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(165, 180, 252, 0.25);
            border-radius: 12px;
            font-size: 0.95rem;
            color: #a5b4fc;
        }
        .signed-in span { color: #f4f4f5; font-weight: 600; }
        .signed-in.hidden { display: none; }
        .balance {
            margin-top: 0.75rem;
            font-size: 1.35rem;
            font-weight: 700;
            color: #f4f4f5;
        }
        .balance-label {
            display: block;
            margin-top: 0.35rem;
            font-size: 0.8rem;
            font-weight: 400;
            color: #71717a;
            font-style: italic;
        }
        #sign-in-btn {
            margin-top: 1.5rem;
            padding: 0.85rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }
        #sign-in-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(99, 102, 241, 0.45);
        }
        #sign-in-menu {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20;
            padding: 1.5rem;
        }
        #sign-in-menu.open { display: flex; }
        .menu-panel {
            width: 100%;
            max-width: 360px;
            background: linear-gradient(160deg, #12121a 0%, #0f0f14 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
        }
        .menu-panel h2 {
            font-size: 1.25rem;
            margin-bottom: 0.35rem;
            color: #f4f4f5;
        }
        .menu-panel p {
            color: #71717a;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            list-style: none;
        }
        .user-list button {
            width: 100%;
            text-align: left;
            padding: 0.85rem 1.15rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: #f4f4f5;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .user-list button:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(165, 180, 252, 0.35);
        }
        .menu-close {
            margin-top: 1rem;
            width: 100%;
            padding: 0.65rem;
            font-family: inherit;
            font-size: 0.9rem;
            color: #71717a;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            cursor: pointer;
        }
        .menu-close:hover { color: #e8e8ec; border-color: rgba(255, 255, 255, 0.18); }
        #start-overlay {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            cursor: pointer; z-index: 10;
        }
        #start-overlay.hidden { display: none; }
        #start-overlay p {
            font-size: 1.1rem; color: #f4f4f5;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        #status { margin-top: 1rem; color: #ef4444; font-size: 0.85rem; min-height: 1.2em; }
    </style>
</head>
<body>
    <div id="start-overlay"><p>Click to enter the shop</p></div>

    <div id="sign-in-menu" aria-hidden="true">
        <div class="menu-panel">
            <h2>Sign in</h2>
            <p>Choose your account</p>
            <ul class="user-list" id="user-list"></ul>
            <button type="button" class="menu-close" id="menu-close">Cancel</button>
        </div>
    </div>

    <div class="container">
        <h1>Store</h1>
        <p class="subtitle" id="subtitle">Shop theme</p>
        <p id="signed-in" class="signed-in hidden">
            Signed in as <span id="signed-in-name"></span>
            <span class="balance-label">Balance</span>
            <span class="balance" id="user-balance">—</span>
        </p>
        <button type="button" id="sign-in-btn">Sign in</button>
        <p id="status"></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script>
        const USERS = ["hok yu", "miles", "rex", "caden", "franklin", "hugo", "asten", "chtim"];
        const USER_COLUMNS = {
            "hok yu": "hokyu",
            miles: "miles",
            rex: "rex",
            caden: "caden",
            franklin: "franklin",
            hugo: "hugo",
            asten: "astin",
            chtim: "chtim"
        };
        const ALL_COLUMNS = Object.values(USER_COLUMNS);
        const STORAGE_KEY = "storeSignedInUser";

        const SUPABASE_URL = "https://jxfmyrgurzoztuxsbyqb.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4Zm15cmd1cnpvenR1eHNieXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDQ5MTMsImV4cCI6MjA5NzcyMDkxM30.GG9Y32NNqNsfEXEah7h2xtVTIgvsJoyi6lWr1WVgvO8";
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const signInMenu = document.getElementById("sign-in-menu");
        const signInBtn = document.getElementById("sign-in-btn");
        const menuClose = document.getElementById("menu-close");
        const userList = document.getElementById("user-list");
        const signedInEl = document.getElementById("signed-in");
        const signedInName = document.getElementById("signed-in-name");
        const userBalance = document.getElementById("user-balance");

        function openSignInMenu() {
            signInMenu.classList.add("open");
            signInMenu.setAttribute("aria-hidden", "false");
        }

        function closeSignInMenu() {
            signInMenu.classList.remove("open");
            signInMenu.setAttribute("aria-hidden", "true");
        }

        let playerData = null;

        async function fetchPlayerData() {
            if (playerData) return playerData;

            const { data, error } = await db
                .from("players")
                .select(ALL_COLUMNS.join(", "))
                .limit(1)
                .maybeSingle();

            if (error) throw error;
            if (!data) throw new Error("No player data found in database");

            playerData = data;
            return playerData;
        }

        async function loadBalance(username) {
            const column = USER_COLUMNS[username];
            userBalance.textContent = "loading...";

            try {
                const data = await fetchPlayerData();
                const value = data[column];

                if (value === null || value === undefined) {
                    throw new Error("Balance not found for " + username);
                }

                userBalance.textContent = value + "$";
                document.getElementById("status").textContent = "";
            } catch (error) {
                console.error("Error fetching balance:", error.message);
                userBalance.textContent = "failed to load";
                document.getElementById("status").textContent = error.message;
            }
        }

        function setSignedInUser(username) {
            localStorage.setItem(STORAGE_KEY, username);
            signedInName.textContent = username;
            signedInEl.classList.remove("hidden");
            signInBtn.textContent = "Switch account";
            closeSignInMenu();
            loadBalance(username);
        }

        function loadSignedInUser() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved && USERS.includes(saved)) {
                signedInName.textContent = saved;
                signedInEl.classList.remove("hidden");
                signInBtn.textContent = "Switch account";
                loadBalance(saved);
            }
        }

        USERS.forEach((username) => {
            const li = document.createElement("li");
            const btn = document.createElement("button");
            btn.type = "button";
            btn.textContent = username;
            btn.addEventListener("click", () => setSignedInUser(username));
            li.appendChild(btn);
            userList.appendChild(li);
        });

        signInBtn.addEventListener("click", openSignInMenu);
        menuClose.addEventListener("click", closeSignInMenu);
        signInMenu.addEventListener("click", (e) => {
            if (e.target === signInMenu) closeSignInMenu();
        });

        loadSignedInUser();
    </script>

        const DURATION = 48.9678;

        let ctx = null;
        let started = false;
        let loopTimer = null;
        const activeOsc = new Set();

        function midiToFreq(n) {
            return 440 * Math.pow(2, (n - 69) / 12);
        }

        function playNote(time, midi, duration, velocity) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "square";
            osc.frequency.value = midiToFreq(midi);
            const vol = Math.max(0.08, velocity * 0.35);
            gain.gain.setValueAtTime(0.0001, time);
            gain.gain.exponentialRampToValueAtTime(vol, time + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(time);
            osc.stop(time + duration + 0.05);
            activeOsc.add(osc);
            osc.onended = () => activeOsc.delete(osc);
        }

        function scheduleLoop(startAt) {
            for (const [t, n, d, v] of NOTES) {
                playNote(startAt + t, n, d, v);
            }
            loopTimer = setTimeout(() => scheduleLoop(ctx.currentTime + 0.05), DURATION * 1000);
        }

        async function startMusic() {
            if (started) return;
            started = true;
            document.getElementById("start-overlay").classList.add("hidden");

            try {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === "suspended") await ctx.resume();

                scheduleLoop(ctx.currentTime + 0.1);
                document.getElementById("subtitle").textContent = "Shop theme playing";
            } catch (err) {
                document.getElementById("status").textContent = "Audio failed: " + err.message;
                started = false;
            }
        }

        document.getElementById("start-overlay").addEventListener("click", startMusic);
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space" || e.code === "Enter") startMusic();
        });
